name: EP Scanner

# ---------------------------------------------------------------------------
# Runs every 5 minutes across US premarket (4:00am–9:29am ET), weekdays only.
#
# GitHub cron is UTC. US premarket in ET maps to UTC as follows:
#   - During EDT (mid-Mar to early-Nov, incl. now): 4:00am ET = 08:00 UTC,
#     9:29am ET = 13:29 UTC.
#   - During EST (winter): shift +1h (09:00–14:29 UTC).
# To keep it simple and cover both, we run every 5 min from 08:00–14:29 UTC.
# That's the union of both DST windows; a few runs land pre-4am/post-open on
# one side of the DST switch, which is harmless (the freshness filter and
# gainers list simply reflect whatever's there).
#
# Public repo = unlimited free Actions minutes, so the ~78 runs/weekday cost
# nothing. Label-caching means only genuinely new names hit the AI.
# Note: GitHub may delay scheduled runs 5–15 min under load.
#
# The FIRST run of each UTC day is a FULL scan (classifies catalysts);
# every subsequent run that day is a cheap REFRESH (re-price, reuse labels).
# ---------------------------------------------------------------------------

on:
  schedule:
    - cron: "*/5 8-13 * * 1-5"     # 08:00–13:55 UTC, every 5 min, Mon–Fri
    - cron: "0-29/5 14 * * 1-5"    # 14:00–14:29 UTC, every 5 min (tail of window)
  workflow_dispatch:                # manual trigger (forces a FULL scan)

permissions:
  contents: write

concurrency:
  group: ep-scanner
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install pandas_market_calendars

      - name: Run scanner
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RUN_LABEL: scheduled
        run: python scanner.py

      - name: Commit results
        run: |
          git config user.name "ep-scanner-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data.json
          git commit -m "scan $(date -u +%Y-%m-%dT%H:%MZ)" || echo "no changes"
          git push
