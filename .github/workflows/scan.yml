name: EP Scanner

# ---------------------------------------------------------------------------
# TWO kinds of run:
#
#   FULL runs (4x/day)  — gather candidates, fetch news, classify with AI,
#                          price, score. These set the catalysts for the day.
#     Run 0  07:00 UTC = 02:00 ET (~07:00 UK)  overnight catalyst watchlist
#     Run 1  13:00 UTC = 08:00 ET (~13:00 UK)  premarket, gaps live
#     Run 2  13:45 UTC = 08:45 ET (~13:45 UK)
#     Run 3  14:15 UTC = 09:15 ET (~14:15 UK)  sharpest pre-open read
#
#   REFRESH runs (every 15 min, premarket window) — reuse the cached AI
#                          labels, only re-price the technicals. NO AI cost,
#                          NO news fetch. Cheap. Keeps gaps/scores current.
#     Every 15 min from 13:00–14:15 UTC on weekdays.
#
# Times are pinned in UTC (GitHub cron is always UTC). In US summer the ET
# offset shifts 1 hour earlier — still inside premarket, so fine.
# Note: GitHub may delay scheduled runs by 5–15 min under load. Public repo
# = unlimited free Actions minutes, so the 15-min cadence costs nothing.
# ---------------------------------------------------------------------------

on:
  schedule:
    # --- FULL runs ---
    - cron: "0 7 * * 1-5"      # Run 0  (full)
    - cron: "0 13 * * 1-5"     # Run 1  (full)
    - cron: "45 13 * * 1-5"    # Run 2  (full)
    - cron: "15 14 * * 1-5"    # Run 3  (full)
    # --- REFRESH runs (every 15 min across the premarket window) ---
    - cron: "15 13 * * 1-5"
    - cron: "30 13 * * 1-5"
    - cron: "0 14 * * 1-5"
    - cron: "30 14 * * 1-5"
    - cron: "45 14 * * 1-5"
  workflow_dispatch:            # manual trigger (runs a FULL scan)

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Decide run label + mode
        id: cfg
        run: |
          case "${{ github.event.schedule }}" in
            "0 7 * * 1-5")   echo "label=0"       >> $GITHUB_OUTPUT; echo "mode=full"    >> $GITHUB_OUTPUT ;;
            "0 13 * * 1-5")  echo "label=1"       >> $GITHUB_OUTPUT; echo "mode=full"    >> $GITHUB_OUTPUT ;;
            "45 13 * * 1-5") echo "label=2"       >> $GITHUB_OUTPUT; echo "mode=full"    >> $GITHUB_OUTPUT ;;
            "15 14 * * 1-5") echo "label=3"       >> $GITHUB_OUTPUT; echo "mode=full"    >> $GITHUB_OUTPUT ;;
            "")              echo "label=manual"  >> $GITHUB_OUTPUT; echo "mode=full"    >> $GITHUB_OUTPUT ;;
            *)               echo "label=refresh" >> $GITHUB_OUTPUT; echo "mode=refresh" >> $GITHUB_OUTPUT ;;
          esac

      - name: Run scanner
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RUN_LABEL: ${{ steps.cfg.outputs.label }}
          MODE: ${{ steps.cfg.outputs.mode }}
        run: python scanner.py

      - name: Commit results
        run: |
          git config user.name "ep-scanner-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data.json
          git commit -m "${{ steps.cfg.outputs.mode }} run ${{ steps.cfg.outputs.label }} $(date -u +%Y-%m-%dT%H:%MZ)" || echo "no changes"
          git push
