<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EP Scanner</title>
<style>
  :root{
    --bg:#0e1116;--panel:#161b22;--panel2:#1c2230;--line:#26303d;
    --ink:#e6edf3;--ink2:#9aa7b4;--ink3:#6b7684;
    --tS:#2dd4a7;--tSb:#0c3a2e;--tA:#4a9df0;--tAb:#0c2a48;
    --tB:#e0a336;--tBb:#3a2c0c;--tC:#7c8794;--tCb:#22282f;
    --accent:#4a9df0;--up:#2dd4a7;--down:#e0736b;--lowfloat:#c98bdb;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);
    font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    -webkit-font-smoothing:antialiased;line-height:1.45;padding:0 16px 80px}
  .wrap{max-width:1120px;margin:0 auto}
  header{display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:12px;
    padding:24px 0 14px;border-bottom:1px solid var(--line);margin-bottom:14px}
  .title{font-size:15px;font-weight:600;letter-spacing:.14em;text-transform:uppercase}
  .title span{color:var(--accent)}
  .meta{font-size:12px;color:var(--ink3);font-variant-numeric:tabular-nums}
  .meta b{color:var(--ink2);font-weight:500}

  .controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .chips{display:flex;gap:4px;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:3px}
  .chip{font-size:12px;padding:5px 12px;border-radius:6px;border:none;background:transparent;color:var(--ink3);cursor:pointer}
  .chip.on{background:var(--panel2);color:var(--ink)}
  .toggle{font-size:12px;padding:6px 11px;border-radius:7px;border:1px solid var(--line);
    background:transparent;color:var(--ink3);cursor:pointer}
  .toggle.on{border-color:var(--accent);color:var(--ink);background:var(--panel2)}
  .liqctl{display:flex;align-items:center;gap:8px}
  .liqctl input[type=range]{width:110px;accent-color:var(--accent);cursor:pointer}
  .liqctl input[type=range]:disabled{opacity:.35;cursor:not-allowed}
  .liqval{font-size:12px;color:var(--ink2);font-variant-numeric:tabular-nums;min-width:42px}
  .liqval.off{color:var(--ink3);opacity:.5}
  .spacer{margin-left:auto}
  .count{font-size:12px;color:var(--ink3);font-variant-numeric:tabular-nums}

  .tbl{width:100%;border-collapse:collapse;font-variant-numeric:tabular-nums}
  thead th{position:sticky;top:0;background:var(--bg);z-index:2;
    font-size:11px;color:var(--ink3);text-transform:uppercase;letter-spacing:.05em;
    text-align:right;padding:8px 10px;border-bottom:1px solid var(--line);cursor:pointer;white-space:nowrap;user-select:none}
  thead th.l{text-align:left}
  thead th:hover{color:var(--ink)}
  thead th .ar{opacity:0;margin-left:3px}
  thead th.sort .ar{opacity:1;color:var(--accent)}

  tbody tr.main{border-bottom:1px solid var(--line);cursor:pointer}
  tbody tr.main:hover{background:var(--panel)}
  tbody td{padding:9px 10px;text-align:right;font-size:13px;white-space:nowrap}
  td.l{text-align:left}
  .tk{font-weight:600;font-size:14px}
  .nm{color:var(--ink3);font-size:11px;margin-left:6px;font-weight:400}
  .tier{display:inline-flex;width:22px;height:22px;border-radius:5px;align-items:center;justify-content:center;
    font-weight:700;font-size:11px;margin-right:8px;vertical-align:middle}
  .tier.S{background:var(--tSb);color:var(--tS)}.tier.A{background:var(--tAb);color:var(--tA)}
  .tier.B{background:var(--tBb);color:var(--tB)}.tier.C{background:var(--tCb);color:var(--tC)}
  .tier.none{background:var(--tCb);color:var(--ink3)}
  .catcell{color:var(--ink2);font-size:12px;max-width:230px;overflow:hidden;text-overflow:ellipsis}
  .up{color:var(--up)}.down{color:var(--down)}
  .lowfloat{color:var(--lowfloat)}
  .muted{color:var(--ink3)}
  .pill{font-size:9px;padding:1px 5px;border-radius:4px;margin-left:5px;color:var(--lowfloat);border:1px solid #3a2745;background:#241a2b}

  tr.detail td{padding:0;border-bottom:1px solid var(--line);background:var(--panel)}
  .dwrap{display:none;padding:14px 16px}
  tr.detail.open .dwrap{display:block}
  .dgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px}
  .dgrid h4{font-size:11px;color:var(--ink3);text-transform:uppercase;letter-spacing:.05em;margin:0 0 7px}
  .bd{display:flex;justify-content:space-between;font-size:12px;padding:2px 0}
  .bd .l2{color:var(--ink2)}.bd .p{font-weight:600}.bd .p.neg{color:var(--down)}
  .news{margin-top:12px;padding-top:10px;border-top:1px solid var(--line)}
  .news a{color:var(--accent);text-decoration:none;font-size:13px}
  .news a:hover{text-decoration:underline}
  .news .src{font-size:11px;color:var(--ink3);margin-top:2px}
  .empty{text-align:center;padding:56px 20px;color:var(--ink3)}
  .empty .big{font-size:16px;color:var(--ink2);margin-bottom:6px}
  @media(max-width:720px){
    .hideSm{display:none}
    .catcell{max-width:130px}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="title">Episodic&nbsp;pivot <span>scanner</span></div>
    <div class="meta" id="meta">loading…</div>
  </header>

  <div class="controls">
    <div class="chips" id="chips">
      <button class="chip on" data-f="fresh">Fresh catalyst</button>
      <button class="chip" data-f="no_catalyst">No catalyst</button>
      <button class="chip" data-f="all">All</button>
    </div>
    <button class="toggle on" id="adrTog">ADR &gt; 4%</button>
    <div class="liqctl">
      <button class="toggle" id="liqTog">Min $vol</button>
      <input type="range" id="liqSlider" min="0" max="200" step="1" value="20" disabled>
      <span class="liqval" id="liqVal">$20M</span>
    </div>
    <span class="spacer"></span>
    <span class="count" id="count"></span>
  </div>

  <table class="tbl">
    <thead><tr id="head"></tr></thead>
    <tbody id="body"></tbody>
  </table>
  <div id="emptyMsg"></div>
</div>

<script>
let DATA={rows:[]};
let view="fresh";
let adrOn=true;
let liqOn=false, liqMin=20;   // optional "min $vol" liquidity slider, off by default
let sortKey="pct", sortDir=-1;   // default: % change descending
const open=new Set();

const COLS=[
  {key:"tk",   label:"Ticker", align:"l", sort:r=>r.ticker},
  {key:"cat",  label:"Catalyst", align:"l", sort:r=>r.catalyst_desc||"", cls:"hideSm"},
  {key:"pct",  label:"% chg", sort:r=>gap(r)},
  {key:"dv",   label:"$vol 1d", sort:r=>r.dollar_volume_m??-1, tip:"Premarket dollar volume (live)"},
  {key:"adr",  label:"ADR", sort:r=>r.adr_pct??-1, tip:"Average daily range %, 20-day"},
  {key:"rvol", label:"PM RVOL", sort:r=>r.rvol??-1, cls:"hideSm", tip:"Premarket volume vs 20-day average DAILY volume. 1.0x = already trading a full day's volume premarket (strong EP tell)."},
  {key:"neg",  label:"Neglect", sort:r=>({high:3,med:2,low:1}[r.neglect]||0), cls:"hideSm"},
  {key:"float",label:"Float", sort:r=>r.float_m??1e9, cls:"hideSm"},
  {key:"hi",   label:"52w", sort:r=>r.pct_below_52w_high??1e9, cls:"hideSm"},
  {key:"score",label:"Score", sort:r=>r.total??-1},
];

function gap(r){return r.premarket_change ?? r.gap_pct ?? 0;}
function fmtTime(iso){try{return new Date(iso).toLocaleString("en-GB",{hour:"2-digit",minute:"2-digit",day:"2-digit",month:"short"})+" UK";}catch(e){return iso;}}

async function load(){
  try{
    DATA=await(await fetch("data.json?t="+Date.now())).json();
    const tf=DATA.table_filters||{};
    // set slider range/default from config (only once, before first draw)
    const sl=document.getElementById("liqSlider");
    if(sl && !sl.dataset.init){
      sl.max=tf.liquid_slider_max_m ?? 200;
      liqMin=tf.liquid_slider_default_m ?? 20;
      sl.value=liqMin;
      document.getElementById("liqVal").textContent=(liqMin>=1000?"$"+(liqMin/1000).toFixed(1)+"B":"$"+liqMin+"M");
      document.getElementById("liqVal").classList.add("off");
      sl.dataset.init="1";
    }
    draw();
  }catch(e){
    document.getElementById("meta").textContent="waiting for first scan";
    document.getElementById("body").innerHTML="";
    document.getElementById("emptyMsg").innerHTML=`<div class="empty"><div class="big">Waiting for first scan</div>Results appear once the scanner runs.</div>`;
  }
}

function passFilters(r){
  if(adrOn && (r.adr_pct==null || r.adr_pct < (DATA.table_filters?.adr_min ?? 4))) return false;
  // optional "min $vol" liquidity filter (slider). Off by default; the scanner
  // already applies the $1.5M hard floor, this is an extra "liquid names only" lens.
  if(liqOn && r.dollar_volume_m!=null && r.dollar_volume_m < liqMin) return false;
  return true;
}

function currentRows(){
  let rows=DATA.rows||[];
  if(view==="fresh") rows=rows.filter(r=>(r.section||"ep")==="ep");
  else if(view==="no_catalyst") rows=rows.filter(r=>r.section==="no_catalyst");
  rows=rows.filter(passFilters);
  const col=COLS.find(c=>c.key===sortKey);
  rows=[...rows].sort((a,b)=>{
    const va=col.sort(a), vb=col.sort(b);
    if(va<vb)return -1*sortDir; if(va>vb)return 1*sortDir; return 0;
  });
  return rows;
}

function draw(){
  // meta
  const ai=DATA.ai_used?'<span style="color:var(--tS)">AI-classified</span>':'<span style="color:var(--ink3)">keyword mode</span>';
  const cal=DATA.fresh_window_ok?'':' · <span style="color:var(--tB)">calendar off</span>';
  document.getElementById("meta").innerHTML=`${ai}${cal} · updated ${fmtTime(DATA.generated_utc)}`;

  // head
  document.getElementById("head").innerHTML=COLS.map(c=>{
    const on=c.key===sortKey?"sort":"";
    const ar=c.key===sortKey?(sortDir<0?"▼":"▲"):"";
    return `<th class="${c.align==='l'?'l':''} ${c.cls||''} ${on}" data-k="${c.key}" title="${c.tip||c.label}">${c.label}<span class="ar">${ar}</span></th>`;
  }).join("");
  document.querySelectorAll("th[data-k]").forEach(th=>{
    th.onclick=()=>{
      const k=th.dataset.k;
      if(sortKey===k) sortDir*=-1;
      else{sortKey=k; sortDir=(k==="tk"||k==="float"||k==="hi")?1:-1;}
      draw();
    };
  });

  const rows=currentRows();
  document.getElementById("count").textContent=`${rows.length} shown`;

  if(!rows.length){
    document.getElementById("body").innerHTML="";
    document.getElementById("emptyMsg").innerHTML=`<div class="empty"><div class="big">Nothing matches</div>${view==="fresh"?"No fresh-catalyst names pass the filters right now.":"Try toggling filters or the view."}</div>`;
    return;
  }
  document.getElementById("emptyMsg").innerHTML="";
  document.getElementById("body").innerHTML=rows.map(rowHtml).join("");
  document.querySelectorAll("tr.main").forEach(tr=>{
    tr.onclick=()=>{
      const tk=tr.dataset.tk;
      const d=document.querySelector(`tr.detail[data-tk="${tk}"]`);
      if(open.has(tk)){open.delete(tk);d.classList.remove("open");}
      else{open.add(tk);d.classList.add("open");}
    };
  });
}

function rowHtml(r){
  const tier=r.catalyst_tier||"C";
  const tierC=(r.catalyst_tier==null)?"none":tier;
  const g=gap(r);
  const low=r.low_float?`<span class="pill">LF</span>`:"";
  const dv=r.dollar_volume_m;
  const isOpen=open.has(r.ticker);
  const negTxt={high:"high",med:"med",low:"—"}[r.neglect]||"—";

  const cbreak=(r.cbreak||[]).map(bd).join("");
  const nbreak=(r.nbreak||[]).map(bd).join("");
  const tbreak=(r.tbreak||[]).map(bd).join("");
  const info=(r.info||[]).map(x=>`<div class="bd"><span class="l2">${x[0]}</span><span class="p">${x[1]}</span></div>`).join("");
  let news="";
  if(r.headline){
    const link=r.news_url?`<a href="${r.news_url}" target="_blank" rel="noopener">${r.headline} ↗</a>`:`<span style="font-size:13px;color:var(--ink2)">${r.headline}</span>`;
    news=`<div class="news">${link}<div class="src">${[r.news_site,r.news_time].filter(Boolean).join(" · ")}</div></div>`;
  }

  return `<tr class="main" data-tk="${r.ticker}">
    <td class="l"><span class="tier ${tierC}">${r.catalyst_tier==null?"·":tier}</span><span class="tk">${r.ticker}</span><span class="nm">${r.name||""}</span>${low}</td>
    <td class="l catcell ${''}">${r.catalyst_desc||"—"}</td>
    <td class="${g>=0?'up':'down'}">${g>=0?'+':''}${g.toFixed(1)}%</td>
    <td>${dv!=null?'$'+fmtM(dv):'—'}</td>
    <td>${r.adr_pct!=null?r.adr_pct.toFixed(1)+'%':'—'}</td>
    <td class="hideSm">${r.rvol!=null?r.rvol.toFixed(1)+'x':'—'}</td>
    <td class="hideSm ${r.neglect==='high'?'up':'muted'}">${negTxt}</td>
    <td class="hideSm ${r.low_float?'lowfloat':''}">${r.float_m!=null?fmtM(r.float_m)+'M':'—'}</td>
    <td class="hideSm muted">${r.pct_below_52w_high!=null?(r.pct_below_52w_high<=2?'high':r.pct_below_52w_high.toFixed(0)+'%'):'—'}</td>
    <td>${r.total??'—'}</td>
  </tr>
  <tr class="detail ${isOpen?'open':''}" data-tk="${r.ticker}"><td colspan="10"><div class="dwrap">
    <div class="dgrid">
      <div><h4>Catalyst · ${r.catalyst_score??0}</h4>${cbreak||'<div class="bd"><span class="l2">—</span></div>'}</div>
      <div><h4>Neglect · ${r.neglect_score??0}</h4>${nbreak||'<div class="bd"><span class="l2">—</span></div>'}
           <h4 style="margin-top:12px">Technicals · ${r.technical_score??0}</h4>${tbreak}</div>
      <div><h4>Info</h4>${info||'<div class="bd"><span class="l2">—</span></div>'}</div>
    </div>${news}
  </div></td></tr>`;
}
function bd(b){const neg=String(b[1]).trim().startsWith("-");return `<div class="bd"><span class="l2">${b[0]}</span><span class="p ${neg?'neg':''}">${b[1]}</span></div>`;}
function fmtM(v){return v>=1000?(v/1000).toFixed(1)+'B':v.toFixed(0)+'M';}

// controls
document.getElementById("chips").addEventListener("click",e=>{
  const b=e.target.closest(".chip"); if(!b)return;
  view=b.dataset.f;
  document.querySelectorAll(".chip").forEach(c=>c.classList.toggle("on",c===b));
  draw();
});
document.getElementById("adrTog").addEventListener("click",function(){adrOn=!adrOn;this.classList.toggle("on",adrOn);draw();});

// Min $vol liquidity: a toggle that enables the slider, and the slider itself.
const liqTog=document.getElementById("liqTog");
const liqSlider=document.getElementById("liqSlider");
const liqVal=document.getElementById("liqVal");
function fmtLiq(v){return v>=1000?"$"+(v/1000).toFixed(1)+"B":"$"+v+"M";}
liqTog.addEventListener("click",function(){
  liqOn=!liqOn;
  this.classList.toggle("on",liqOn);
  liqSlider.disabled=!liqOn;
  liqVal.classList.toggle("off",!liqOn);
  draw();
});
liqSlider.addEventListener("input",function(){
  liqMin=parseInt(this.value,10);
  liqVal.textContent=fmtLiq(liqMin);
  if(liqOn) draw();
});

setInterval(load,5*60*1000);
load();
</script>
</body>
</html>
