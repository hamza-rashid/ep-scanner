<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EP Scanner</title>
<style>
  :root{
    --bg:#0e1116; --panel:#161b22; --panel2:#1c2230; --line:#26303d;
    --ink:#e6edf3; --ink2:#9aa7b4; --ink3:#6b7684;
    --tS:#2dd4a7; --tSb:#0c3a2e; --tA:#4a9df0; --tAb:#0c2a48;
    --tB:#e0a336; --tBb:#3a2c0c; --tC:#7c8794; --tCb:#22282f;
    --accent:#4a9df0; --down:#e0736b; --lowfloat:#c98bdb;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);
    font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    -webkit-font-smoothing:antialiased;line-height:1.5;padding:0 16px 80px}
  .wrap{max-width:940px;margin:0 auto}
  header{display:flex;align-items:baseline;justify-content:space-between;
    flex-wrap:wrap;gap:12px;padding:28px 0 16px;border-bottom:1px solid var(--line);margin-bottom:18px}
  .title{font-size:15px;font-weight:600;letter-spacing:.14em;text-transform:uppercase}
  .title span{color:var(--accent)}
  .meta{font-size:12px;color:var(--ink3);font-variant-numeric:tabular-nums}
  .meta b{color:var(--ink2);font-weight:500}
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:22px}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px 14px}
  .stat .k{font-size:11px;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em}
  .stat .v{font-size:22px;font-weight:600;font-variant-numeric:tabular-nums;margin-top:3px}
  .hd{display:grid;grid-template-columns:26px 40px 1fr 96px 18px;gap:12px;padding:0 14px 8px;
    font-size:11px;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em}
  .hd .r{text-align:right}
  .row{background:var(--panel);border:1px solid var(--line);border-radius:10px;
    margin-bottom:8px;overflow:hidden;transition:border-color .12s,opacity .3s}
  .row:hover{border-color:#33404f}
  .row.cooling{opacity:.5}.row.cooling:hover{opacity:.85}
  .rowhead{display:grid;grid-template-columns:26px 40px 1fr 96px 18px;gap:12px;
    align-items:center;padding:12px 14px;cursor:pointer}
  .rank{font-size:17px;font-weight:600;color:var(--ink3);font-variant-numeric:tabular-nums}
  .tier{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;
    justify-content:center;font-weight:700;font-size:15px}
  .tier.S{background:var(--tSb);color:var(--tS)}.tier.A{background:var(--tAb);color:var(--tA)}
  .tier.B{background:var(--tBb);color:var(--tB)}.tier.C{background:var(--tCb);color:var(--tC)}
  .tier.none{background:var(--tCb);color:var(--tC)}
  .tk{font-size:15px;font-weight:600}
  .nm{font-size:12px;color:var(--ink3);margin-left:8px;font-weight:400}
  .pill{font-size:10px;padding:1px 6px;border-radius:5px;margin-left:6px;vertical-align:1px}
  .pill.low{color:var(--lowfloat);border:1px solid #3a2745;background:#241a2b}
  .cat{font-size:13px;color:var(--ink2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .score{text-align:right}
  .score .big{font-size:20px;font-weight:600;font-variant-numeric:tabular-nums}
  .score .sub{font-size:11px;color:var(--ink3);font-variant-numeric:tabular-nums}
  .chev{color:var(--ink3);transition:transform .15s;font-size:12px}
  .row.open .chev{transform:rotate(180deg)}
  .detail{display:none;padding:2px 14px 16px;border-top:1px solid var(--line)}
  .row.open .detail{display:block}
  .dgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px;margin-top:12px}
  .detail h4{font-size:11px;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em;margin:0 0 8px;font-weight:600}
  .bd{display:flex;justify-content:space-between;font-size:12px;padding:3px 0}
  .bd .l{color:var(--ink2)}.bd .p{color:var(--ink);font-weight:600;font-variant-numeric:tabular-nums}
  .bd .p.neg{color:var(--down)}
  .news{margin-top:14px;padding-top:12px;border-top:1px solid var(--line)}
  .news a{color:var(--accent);text-decoration:none;font-size:13px}
  .news a:hover{text-decoration:underline}
  .news .src{font-size:11px;color:var(--ink3);margin-top:3px}
  .divider{display:flex;align-items:center;gap:12px;margin:22px 4px 12px;color:var(--ink3);
    font-size:11px;text-transform:uppercase;letter-spacing:.08em}
  .divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--line)}
  .empty{text-align:center;padding:60px 20px;color:var(--ink3)}
  .empty .big{font-size:16px;color:var(--ink2);margin-bottom:6px}
  @media(max-width:640px){.stats{grid-template-columns:repeat(2,1fr)}.hd{display:none}
    .rowhead{grid-template-columns:22px 34px 1fr 76px 16px}.nm{display:none}.dgrid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="title">Episodic&nbsp;pivot <span>scanner</span></div>
    <div class="meta" id="meta">loading…</div>
  </header>
  <div class="stats" id="stats"></div>
  <div class="hd"><div>#</div><div>Tier</div><div>Ticker · catalyst</div><div class="r">Score</div><div></div></div>
  <div id="list"></div>
</div>
<script>
const tierClass={S:"S",A:"A",B:"B",C:"C",null:"none"};
const openRows=new Set();
function fmtTime(iso){try{return new Date(iso).toLocaleString("en-GB",{hour:"2-digit",minute:"2-digit",day:"2-digit",month:"short"})+" UK";}catch(e){return iso;}}
function gapOf(r){return r.premarket_change ?? r.gap_pct;}

async function load(){
  try{
    const d=await(await fetch("data.json?t="+Date.now())).json();
    render(d);
  }catch(e){
    document.getElementById("meta").textContent="waiting for first scan";
    document.getElementById("list").innerHTML=`<div class="empty"><div class="big">Waiting for first scan</div>Results appear once the scanner runs.</div>`;
  }
}

function render(d){
  const rows=d.rows||[];
  const ep=rows.filter(r=>(r.section||"ep")==="ep");
  const epActive=ep.filter(r=>!r.cooling);
  const epCool=ep.filter(r=>r.cooling);
  const noc=rows.filter(r=>r.section==="no_catalyst");

  const ai=d.ai_used?'<span style="color:var(--tS)">AI-classified</span>':'<span style="color:var(--ink3)">keyword mode</span>';
  const cal=d.fresh_window_ok?'':' · <span style="color:var(--tB)">calendar off</span>';
  document.getElementById("meta").innerHTML=`<b>${epActive.length}</b> EP · ${noc.length} gapping · ${ai}${cal} · ${fmtTime(d.generated_utc)}`;

  const gaps=epActive.map(gapOf).filter(g=>g!=null);
  const avg=gaps.length?Math.round(gaps.reduce((a,b)=>a+b,0)/gaps.length):0;
  const sa=epActive.filter(r=>["S","A"].includes(r.catalyst_tier)).length;
  document.getElementById("stats").innerHTML=`
    <div class="stat"><div class="k">EP board</div><div class="v">${epActive.length}</div></div>
    <div class="stat"><div class="k">Tier S/A</div><div class="v">${sa}</div></div>
    <div class="stat"><div class="k">Avg gap</div><div class="v">${avg}%</div></div>
    <div class="stat"><div class="k">Top score</div><div class="v">${epActive[0]?epActive[0].total:"—"}</div></div>`;

  let html="";let rank=1;
  if(!ep.length&&!noc.length){
    html=`<div class="empty"><div class="big">No episodic pivots right now</div>Quiet mornings happen — nothing with a fresh catalyst is gapping.</div>`;
  }else{
    epActive.forEach(r=>html+=rowHtml(r,rank++));
    if(epCool.length){html+=`<div class="divider">cooling — dropped below cutoff, still watchable</div>`;epCool.forEach(r=>html+=rowHtml(r,null));}
    if(noc.length){html+=`<div class="divider">gapping · no fresh catalyst found — check manually</div>`;noc.forEach(r=>html+=rowHtml(r,null));}
  }
  document.getElementById("list").innerHTML=html;
  document.querySelectorAll(".row").forEach(el=>{
    const tk=el.dataset.tk;
    el.querySelector(".rowhead").addEventListener("click",()=>{
      el.classList.toggle("open");
      if(openRows.has(tk))openRows.delete(tk);else openRows.add(tk);
    });
  });
}

function rowHtml(r,rank){
  const tier=r.catalyst_tier||"C";
  const g=gapOf(r);const dv=r.dollar_volume_m;
  const sub=[g!=null?`gap ${g.toFixed(0)}%`:null,dv!=null?`$${dv.toFixed(0)}M`:null].filter(Boolean).join(" · ");
  const isOpen=openRows.has(r.ticker);
  const low=r.low_float?`<span class="pill low">low float</span>`:"";
  const cbreak=(r.cbreak||[]).map(bd).join("");
  const nbreak=(r.nbreak||[]).map(bd).join("");
  const tbreak=(r.tbreak||[]).map(bd).join("");
  const info=(r.info||[]).map(x=>`<div class="bd"><span class="l">${x[0]}</span><span class="p">${x[1]}</span></div>`).join("");
  let news="";
  if(r.headline){
    const link=r.news_url?`<a href="${r.news_url}" target="_blank" rel="noopener">${r.headline} ↗</a>`:`<span style="font-size:13px;color:var(--ink2)">${r.headline}</span>`;
    news=`<div class="news">${link}<div class="src">${[r.news_site,r.news_time].filter(Boolean).join(" · ")}</div></div>`;
  }
  return `<div class="row ${r.cooling?'cooling':''} ${isOpen?'open':''}" data-tk="${r.ticker}">
    <div class="rowhead">
      <div class="rank">${rank??"·"}</div>
      <div class="tier ${tierClass[tier]}">${tier==null||tier==="null"?"·":tier}</div>
      <div style="min-width:0">
        <div><span class="tk">${r.ticker}</span><span class="nm">${r.name||""}</span>${low}</div>
        <div class="cat">${r.catalyst_desc||""}</div>
      </div>
      <div class="score"><div class="big">${r.total}</div><div class="sub">${sub}</div></div>
      <div class="chev">▾</div>
    </div>
    <div class="detail">
      <div class="dgrid">
        <div><h4>Catalyst · ${r.catalyst_score??0}</h4>${cbreak||'<div class="bd"><span class="l">—</span></div>'}</div>
        <div><h4>Neglect · ${r.neglect_score??0}</h4>${nbreak||'<div class="bd"><span class="l">—</span></div>'}
          <h4 style="margin-top:14px">Technicals · ${r.technical_score??0}</h4>${tbreak}</div>
        <div><h4>Info</h4>${info||'<div class="bd"><span class="l">—</span></div>'}</div>
      </div>
      ${news}
    </div>
  </div>`;
}
function bd(b){const neg=String(b[1]).trim().startsWith("-");return `<div class="bd"><span class="l">${b[0]}</span><span class="p ${neg?'neg':''}">${b[1]}</span></div>`;}

setInterval(load,5*60*1000);
load();
</script>
</body>
</html>
